function toggle_pcmode {
	if [ -z "$pcmode" ]; then
		set pcmode_title="Enable PC_MODE"
		set pcmode_next="PC_MODE=1"
	else
		set pcmode_title="Disable PC_MODE"
		set pcmode_next=""
	fi
	export pcmode_title
	export pcmode_next
	submenu --class driver --class="toggle_pcmode" "$pcmode_title" {
		set pcmode="$pcmode_next"
		export pcmode
		normal
	}
}

